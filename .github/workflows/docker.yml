name: Version 2.0.0

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: Lorecami
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build -t ghcr.io/lorecami/examen-devops:1.0.0 .
          docker tag ghcr.io/lorecami/examen-devops:1.0.0 ghcr.io/lorecami/examen-devops:latest

      - name: Push Image
        run: |
          docker push ghcr.io/lorecami/examen-devops:1.0.0
          docker push ghcr.io/lorecami/examen-devops:latest