name: Version 1.0.0

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/examen-devops:1.0.0 .
          docker tag ghcr.io/${{ github.repository_owner }}/examen-devops:1.0.0 ghcr.io/${{ github.repository_owner }}/examen-devops:latest

      - name: Push Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/examen-devops:1.0.0
          docker push ghcr.io/${{ github.repository_owner }}/examen-devops:latest