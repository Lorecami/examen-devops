services:

  db:
    image: postgres:15
    container_name: postgres_db

    environment:
      POSTGRES_DB: empresa
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "8080:80"

    depends_on:
      - db

    volumes:
      - pgadmin_data:/var/lib/pgadmin

  flask-app:
    build: .

    container_name: flask_app

    ports:
      - "5000:5000"

    environment:
      APP_NAME: Sistema Productos
      VERSION: 1.0.0

      DB_HOST: db
      DB_NAME: empresa
      DB_USER: admin
      DB_PASSWORD: admin123

    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data: